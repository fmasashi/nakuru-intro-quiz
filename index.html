<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="藍月なくる（Aitsuki Nakuru）の楽曲イントロクイズ。YouTubeのイントロを聴いて曲名を当てよう！">
  <title>藍月なくる イントロクイズ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hidden BGM player -->
  <div id="bgm-player" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

  <!-- BGM now playing -->
  <div id="bgm-now-playing" class="bgm-now-playing hidden">
    <button id="bgm-toggle" class="bgm-btn" title="BGM ON/OFF">♪</button>
    <span id="bgm-song-name"></span>
    <input type="range" id="bgm-volume" class="bgm-volume" min="0" max="30" value="8" title="BGM音量">
  </div>

  <div class="bg-effects">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="jellyfish-container">
      <div class="jellyfish jf-1">&#x25CB;</div>
      <div class="jellyfish jf-2">&#x25CB;</div>
      <div class="jellyfish jf-3">&#x25CB;</div>
    </div>
  </div>

  <div id="app">
    <!-- Start Screen -->
    <div id="screen-start" class="screen active">
      <div class="card glass-card start-card">
        <div class="logo-area">
          <div class="logo-icon">&#9835;</div>
          <h1 id="main-title">藍月なくる<br><span class="sub-title">イントロクイズ</span></h1>
        </div>
        <p class="description">YouTubeのイントロを聴いて<br>曲名を当てよう！</p>

        <!-- Difficulty -->
        <div class="difficulty-selector">
          <p class="label">再生秒数</p>
          <div class="difficulty-options">
            <button class="diff-btn active" data-seconds="3" id="diff-easy">
              <span class="diff-icon diff-stars"><span class="star filled">&#9733;</span><span class="star">&#9734;</span><span class="star">&#9734;</span></span>
              <span class="diff-label">かんたん</span>
              <span class="diff-sec">3秒</span>
            </button>
            <button class="diff-btn" data-seconds="2" id="diff-normal">
              <span class="diff-icon diff-stars"><span class="star filled">&#9733;</span><span class="star filled">&#9733;</span><span class="star">&#9734;</span></span>
              <span class="diff-label">ふつう</span>
              <span class="diff-sec">2秒</span>
            </button>
            <button class="diff-btn" data-seconds="1" id="diff-hard">
              <span class="diff-icon diff-stars"><span class="star filled">&#9733;</span><span class="star filled">&#9733;</span><span class="star filled">&#9733;</span></span>
              <span class="diff-label">むずかしい</span>
              <span class="diff-sec">1秒</span>
            </button>
          </div>
        </div>

        <!-- Game Mode -->
        <div class="settings-row">
          <div class="setting-group">
            <p class="label">ゲームモード</p>
            <div class="chip-options" id="game-mode-options">
              <button class="chip active" data-mode="normal">ノーマル</button>
              <button class="chip" data-mode="timeattack">タイムアタック</button>
              <button class="chip" data-mode="weakonly">苦手曲のみ</button>
            </div>
          </div>
        </div>

        <!-- Question Count & Choice Count -->
        <div class="settings-row dual">
          <div class="setting-group">
            <p class="label">出題数</p>
            <div class="chip-options" id="count-options">
              <button class="chip active" data-count="10">10問</button>
              <button class="chip" data-count="25">25問</button>
              <button class="chip" data-count="0">全問</button>
            </div>
          </div>
          <div class="setting-group">
            <p class="label">選択肢</p>
            <div class="chip-options" id="choice-count-options">
              <button class="chip active" data-choices="4">4択</button>
              <button class="chip" data-choices="6">6択</button>
              <button class="chip" data-choices="8">8択</button>
            </div>
          </div>
        </div>

        <!-- Category Filter -->
        <div class="settings-row">
          <div class="setting-group">
            <p class="label">カテゴリ</p>
            <div class="chip-options multi" id="category-options">
              <button class="chip active" data-cat="all">すべて</button>
              <button class="chip active" data-cat="solo">ソロ</button>
              <button class="chip active" data-cat="endorfin">Endorfin.</button>
              <button class="chip active" data-cat="la_priere">La priere</button>
              <button class="chip active" data-cat="itsukinkuru">いつきんくる</button>
              <button class="chip active" data-cat="collab">コラボ</button>
            </div>
          </div>
        </div>

        <!-- High Score Display -->
        <div class="highscore-display" id="highscore-display" style="display:none">
          <p class="label">ハイスコア</p>
          <div class="highscore-values">
            <span class="hs-score" id="hs-score">-</span>
            <span class="hs-time" id="hs-time">-</span>
          </div>
        </div>

        <button id="btn-start" class="btn-primary">
          <span class="btn-text">スタート</span>
          <span class="btn-icon">&#9654;</span>
        </button>
          <div style="margin-top:12px; display:flex; gap:8px; justify-content:center;">
            <button class="btn-secondary" id="btn-show-stats">過去の成績</button>
          </div>
        <p class="song-count-info">全 <span id="total-songs">0</span> 曲収録 / 対象: <span id="filtered-count">0</span> 曲</p>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="screen-quiz" class="screen">
      <div class="quiz-header">
        <div class="stats-bar">
          <div class="stat-item">
            <span class="stat-label">スコア</span>
            <span class="stat-value" id="score">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">問題</span>
            <span class="stat-value"><span id="current-q">1</span> / <span id="total-q">10</span></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">連続</span>
            <span class="stat-value" id="streak">0</span>
          </div>
          <button class="btn-quit" id="btn-quit" title="タイトルに戻る">&#x2715;</button>
        </div>
        <!-- Progress bar -->
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="card glass-card quiz-card">
        <div class="player-area">
          <div id="youtube-player-container">
            <div id="youtube-player"></div>
          </div>
          <div class="play-overlay" id="play-overlay">
            <button class="btn-play" id="btn-play">
              <span class="play-icon">&#9654;</span>
              <span class="play-text">イントロ再生</span>
            </button>
          </div>
          <div class="player-controls">
            <div class="timer-bar">
              <div class="timer-fill" id="timer-fill"></div>
            </div>
            <div class="controls-row">
              <div class="inline-diff" id="inline-diff">
                <button class="inline-diff-btn active" data-seconds="3">3s</button>
                <button class="inline-diff-btn" data-seconds="2">2s</button>
                <button class="inline-diff-btn" data-seconds="1">1s</button>
              </div>
              <div class="volume-control">
                <span class="volume-icon" id="volume-icon">&#9834;</span>
                <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="40">
                <span class="volume-value" id="volume-value">40</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Time attack timer display -->
        <div class="ta-timer hidden" id="ta-timer">
          <span class="ta-label">回答時間</span>
          <span class="ta-value" id="ta-value">0.0s</span>
        </div>

        <div class="quiz-body">
          <div class="choices-area" id="choices-area">
            <!-- Choices are dynamically generated -->
          </div>

          <div class="result-area hidden" id="result-area">
            <div class="result-icon" id="result-icon"></div>
            <p class="result-text" id="result-text"></p>
            <p class="result-song" id="result-song"></p>
            <button class="btn-primary btn-next" id="btn-next">
              <span class="btn-text">次の問題</span>
              <span class="btn-icon">&rarr;</span>
            </button>
            <img class="result-thumbnail" id="result-thumbnail" src="" alt="" loading="lazy">
            <p class="result-info" id="result-info"></p>
            <p class="result-lyrics" id="result-lyrics"></p>
            <a class="result-youtube-link" id="result-youtube-link" href="#" target="_blank" rel="noopener">YouTubeで聴く</a>
            <div class="result-actions">
              <button class="btn-replay" id="btn-replay">もう一度聴く</button>
              <button class="btn-full-listen" id="btn-full-listen">フルで聴く</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Review Screen -->
    <div id="screen-review" class="screen">
      <div class="card glass-card review-card">
        <h2 class="review-title">結果一覧</h2>
        <div class="review-list" id="review-list">
          <!-- Dynamically generated -->
        </div>
        <button class="btn-primary" id="btn-review-back">
          <span class="btn-text">結果に戻る</span>
        </button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
      <div class="card glass-card result-card">
        <div class="result-header">
          <div class="trophy-icon"></div>
          <h2>クイズ終了！</h2>
        </div>
        <div class="final-stats">
          <div class="final-stat">
            <span class="final-stat-value" id="final-score">0</span>
            <span class="final-stat-label">スコア</span>
          </div>
          <div class="final-stat">
            <span class="final-stat-value" id="final-correct">0</span>
            <span class="final-stat-label">正解数</span>
          </div>
          <div class="final-stat">
            <span class="final-stat-value" id="final-streak">0</span>
            <span class="final-stat-label">最大連続</span>
          </div>
          <div class="final-stat">
            <span class="final-stat-value" id="final-time">0:00</span>
            <span class="final-stat-label">クリアタイム</span>
          </div>
        </div>
        <div class="rank-display">
          <span class="rank-label">ランク</span>
          <span class="rank-value" id="rank-value">-</span>
        </div>
        <div id="final-review-list" class="final-review-list"></div>
        <div class="highscore-badge hidden" id="new-highscore">
          NEW HIGH SCORE!
        </div>
        <div class="result-buttons">
          <button class="btn-primary" id="btn-show-review">結果一覧を見る</button>
          <button class="btn-primary" id="btn-restart">
            <span class="btn-text">もう一度プレイ</span>
            <span class="btn-icon">&orarr;</span>
          </button>
            <button class="btn-primary" id="btn-retry-wrong" title="間違えた曲だけで再チャレンジ">間違えた曲だけで再チャレンジ</button>
            <button class="btn-secondary" id="btn-share-x">Xで共有</button>
          <button class="btn-secondary" id="btn-back-title">タイトルに戻る</button>
        </div>
      </div>
    </div>

    <!-- Stats Screen -->
    <div id="screen-stats" class="screen">
      <div class="card glass-card review-card">
        <h2 class="review-title">過去の成績</h2>
        <div id="stats-content">
          <!-- populated dynamically -->
        </div>
        <div style="display:flex; gap:8px; justify-content:center; margin-top:12px;">
          <button class="btn-primary" id="btn-stats-back">閉じる</button>
          <button class="btn-secondary" id="btn-clear-stats">成績を削除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Keyboard shortcut hint -->
  <div class="keyboard-hint" id="keyboard-hint">
    <span>1-8: 選択</span>
    <span>Space: 再生</span>
    <span>Enter: 次へ</span>
    <span>Esc: 退出</span>
  </div>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>
